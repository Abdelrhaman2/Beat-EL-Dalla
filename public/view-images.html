<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>View Images</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #eee; }
    .container { display: flex; flex-wrap: wrap; gap: 20px; }
    .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 300px; text-align: center; }
    .card img { max-width: 100%; height: auto; border-radius: 4px; display: block; margin: 0 auto 10px; }
    .filename { font-weight: bold; word-break: break-all; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Image Viewer</h1>
  <div class="container">
    <div class="card">
      <img src="images/2090b5e087aa5bf812a4d129d9077581.webp" />
      <div class="filename">2090b5e087aa5bf812a4d129d9077581.webp</div>
    </div>
    <div class="card">
      <img src="images/485596366_1034687208696607_3321872789812507564_n.webp" />
      <div class="filename">485596366_1034687208696607_3321872789812507564_n.webp</div>
    </div>
    <div class="card">
      <img src="images/486497073_3956084347999086_4471018707324073850_n.webp" />
      <div class="filename">486497073_3956084347999086_4471018707324073850_n.webp</div>
    </div>
    <div class="card">
      <img src="images/542750598_122095036653011369_865901035294125996_n.webp" />
      <div class="filename">542750598_122095036653011369_865901035294125996_n.webp</div>
    </div>
    <div class="card">
      <img src="images/700657904_122104988450612853_7872847995121171159_n.webp" />
      <div class="filename">700657904_122104988450612853_7872847995121171159_n.webp</div>
    </div>
  </div>
</body>
</html>
